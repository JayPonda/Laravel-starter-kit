<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health Check - Laravel Boilerplate</title>
    <link rel="stylesheet" href="styleguild.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Laravel Boilerplate</a>
        <div class="user-nav">
            <a href="login.html" class="link">Login</a>
            <a href="register.html" class="link">Register</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <h1>System Health</h1>
        </div>

        <div class="card card-centered">
            <div id="status-badge" class="status-badge status-loading">
                Checking Status...
            </div>
            <p id="timestamp" class="divider">Current system status as of --:--:--</p>

            <div>
                <div class="info-item">
                    <span class="info-label">Application (Backend)</span>
                    <span id="app-status" class="info-value">Checking...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Database</span>
                    <span id="db-status" class="info-value">Checking...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Redis</span>
                    <span id="redis-status" class="info-value">Checking...</span>
                </div>
            </div>

            <div class="divider">
                <div class="flex-row-center">
                    <a href="login.html" class="link">Login</a>
                    <a href="register.html" class="link">Register</a>
                    <a href="dashboard.html" class="link">Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin.replace(':8081', ':20143');
        const API_URL = API_BASE + '/api';
        async function checkHealth() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const badge = document.getElementById('status-badge');
                badge.textContent = `System ${data.status.toUpperCase()}`;
                badge.className = `status-badge ${data.status === 'up' ? 'status-up' : 'status-down'}`;
                document.getElementById('timestamp').textContent = `Current system status as of ${data.timestamp}`;
                const appStatus = document.getElementById('app-status');
                appStatus.textContent = 'Online';
                appStatus.className = 'info-value status-up';
                appStatus.style.background = 'none';
                const dbStatus = document.getElementById('db-status');
                dbStatus.textContent = data.database ? 'Connected' : 'Disconnected';
                dbStatus.className = `info-value ${data.database ? 'status-up' : 'status-down'}`;
                dbStatus.style.background = 'none';
                const redisStatus = document.getElementById('redis-status');
                redisStatus.textContent = data.redis ? 'Connected' : 'Disconnected';
                redisStatus.className = `info-value ${data.redis ? 'status-up' : 'status-down'}`;
                redisStatus.style.background = 'none';
            } catch (error) {
                const badge = document.getElementById('status-badge');
                badge.textContent = 'System DOWN';
                badge.className = 'status-badge status-down';
                document.getElementById('app-status').textContent = 'Offline';
                document.getElementById('app-status').className = 'info-value status-down';
            }
        }
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>

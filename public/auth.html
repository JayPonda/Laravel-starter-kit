<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laravel Auth</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #0066cc; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:hover { background: #0052a3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .success { background: #efe; color: #060; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom-color: #0066cc; color: #0066cc; }
        .hidden { display: none; }
        .link { color: #0066cc; cursor: pointer; text-decoration: underline; font-size: 14px; }
        .link:hover { color: #0052a3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Laravel Auth</h1>
            <div id="message" class="hidden"></div>
            
            <div class="tabs">
                <div class="tab active" data-tab="login">Login</div>
                <div class="tab" data-tab="register">Register</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <h2>Login</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Login</button>
                <div style="margin-top: 12px; text-align: center;">
                    <span class="link" data-tab="reset">Forgot Password?</span>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <h2>Register</h2>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="8">
                </div>
                <button type="submit">Register</button>
            </form>

            <!-- Reset Password Form -->
            <form id="reset-form" class="hidden">
                <h2>Reset Password</h2>
                <p style="margin-bottom: 16px; font-size: 14px; color: #666;">Enter your email, old password, and a new password will be generated.</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Old Password</label>
                    <input type="password" name="old_password" required>
                </div>
                <button type="submit">Reset Password</button>
                <div style="margin-top: 12px; text-align: center;">
                    <span class="link" data-tab="login">Back to Login</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let token = localStorage.getItem('token');

        // Tab switching
        document.querySelectorAll('.tab, .link[data-tab]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const tab = el.dataset.tab;
                if (tab) showTab(tab);
            });
        });

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-tab="${tab}"]`);
            if (activeTab) activeTab.classList.add('active');
            
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('reset-form').classList.toggle('hidden', tab !== 'reset');
            
            hideMessage();
        }

        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        async function apiCall(endpoint, data, method = 'POST') {
            console.log(`[API Call] ${method} ${endpoint}`, data);
            const opts = { 
                method, 
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                } 
            };
            if (token) opts.headers['Authorization'] = `Bearer ${token}`;
            if (data) opts.body = JSON.stringify(data);
            
            try {
                const res = await fetch(`${API_URL}${endpoint}`, opts);
                console.log(`[API Response] ${res.status} ${endpoint}`);
                const json = await res.json();
                
                if (!res.ok) throw new Error(json.message || (json.errors ? JSON.stringify(json.errors) : 'Request failed'));
                return json;
            } catch (err) {
                console.error(`[API Error] ${endpoint}:`, err);
                throw err;
            }
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            hideMessage();
            
            try {
                const { email, password } = Object.fromEntries(new FormData(e.target));
                const res = await apiCall('/login', { email, password });
                token = res.token;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(res.user));
                showMessage('Login successful!', 'success');
                setTimeout(() => window.location.reload(), 1000);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Registering...';
            hideMessage();
            
            try {
                const form = Object.fromEntries(new FormData(e.target));
                const res = await apiCall('/register', form);
                token = res.token;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(res.user));
                showMessage('Registration successful!', 'success');
                setTimeout(() => showTab('login'), 1500);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // Reset Password
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Resetting...';
            hideMessage();
            
            try {
                const { email, old_password } = Object.fromEntries(new FormData(e.target));
                const res = await apiCall('/reset-password', { email, old_password });
                showMessage(`Password reset! Temporary password: ${res.temporary_password}`, 'success');
                setTimeout(() => showTab('login'), 5000);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // Check if already logged in
        (async () => {
            if (token) {
                try {
                    await apiCall('/me');
                    window.location.href = '/dashboard';
                } catch {
                    localStorage.removeItem('token');
                    token = null;
                }
            }
        })();
    </script>
</body>
</html>

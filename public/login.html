<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Laravel Boilerplate</title>
    <link rel="stylesheet" href="styleguild.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Laravel Boilerplate</a>
        <div class="user-nav">
            <a href="register.html" class="link">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-header">Login</h2>
            <div id="message" class="hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                    <span class="password-toggle" onclick="togglePassword(this)">Show</span>
                </div>
                <button type="submit">Login</button>
                <div class="divider">
                    <span class="link" onclick="showReset()">Forgot Password?</span>
                </div>
            </form>

            <form id="reset-form" class="hidden">
                <p class="divider">Enter your email and old password to reset.</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Old Password</label>
                    <input type="password" name="old_password" required>
                </div>
                <button type="submit">Reset Password</button>
                <div class="divider">
                    <span class="link" onclick="showLogin()">Back to Login</span>
                </div>
            </form>

            <div class="divider">
                <p class="text-muted">Don't have an account? <a href="register.html" class="link">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.replace(':8081', ':20143') + '/api';
        function togglePassword(el) {
            const input = el.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            el.textContent = input.type === 'password' ? 'Show' : 'Hide';
        }
        function showReset() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('reset-form').classList.remove('hidden');
            hideMessage();
        }
        function showLogin() {
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            hideMessage();
        }
        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.classList.remove('hidden');
        }
        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }
        async function apiCall(endpoint, data, method = 'POST') {
            const opts = { 
                method, 
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' } 
            };
            if (data) opts.body = JSON.stringify(data);
            const res = await fetch(`${API_URL}${endpoint}`, opts);
            const json = await res.json();
            if (!res.ok) throw new Error(json.message || 'Request failed');
            return json;
        }
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            hideMessage();
            try {
                const { email, password } = Object.fromEntries(new FormData(e.target));
                const res = await apiCall('/login', { email, password });
                localStorage.setItem('token', res.token);
                showMessage('Login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

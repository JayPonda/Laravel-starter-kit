<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Laravel Auth</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; position: relative; }
        label { display: block; margin-bottom: 4px; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #0066cc; }
        .password-toggle { position: absolute; right: 10px; top: 32px; font-size: 12px; color: #0066cc; cursor: pointer; user-select: none; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:hover { background: #0052a3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .success { background: #efe; color: #060; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .hidden { display: none; }
        .link { color: #0066cc; cursor: pointer; text-decoration: underline; font-size: 14px; }
        .link:hover { color: #0052a3; }
        .nav-links { margin-top: 20px; text-align: center; border-top: 1px solid #eee; pt: 16px; padding-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Laravel Auth</h1>
            <div id="message" class="hidden"></div>

            <!-- Register Form -->
            <form id="register-form">
                <h2>Register</h2>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="reg-password" required minlength="8">
                    <span class="password-toggle" onclick="togglePassword(this)">Show</span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password_confirmation" id="reg-password-confirm" required minlength="8">
                    <span class="password-toggle" onclick="togglePassword(this)">Show</span>
                </div>
                <button type="submit">Register</button>
            </form>

            <div class="nav-links">
                <p style="font-size: 14px;">Already have an account? <a href="login.html" class="link">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.replace(':8081', ':20143') + '/api';
        let token = localStorage.getItem('token');

        function togglePassword(el) {
            const input = el.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            el.textContent = input.type === 'password' ? 'Show' : 'Hide';
        }

        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        async function apiCall(endpoint, data, method = 'POST') {
            const opts = { 
                method, 
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' } 
            };
            if (token) opts.headers['Authorization'] = `Bearer ${token}`;
            if (data) opts.body = JSON.stringify(data);
            
            const res = await fetch(`${API_URL}${endpoint}`, opts);
            const json = await res.json();
            if (!res.ok) throw new Error(json.message || 'Request failed');
            return json;
        }

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            if (data.password !== data.password_confirmation) {
                showMessage('Passwords do not match');
                return;
            }

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            
            try {
                const res = await apiCall('/register', data);
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                showMessage('Registration successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Check login status
        (async () => {
            if (token) {
                try {
                    await apiCall('/me');
                    window.location.href = 'dashboard.html';
                } catch {
                    localStorage.removeItem('token');
                }
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Laravel Boilerplate</title>
    <link rel="stylesheet" href="styleguild.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Laravel Boilerplate</a>
        <div class="user-nav">
            <a href="login.html" class="link">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-header">Register</h2>
            <div id="message" class="hidden"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="reg-password" required minlength="8">
                    <span class="password-toggle" onclick="togglePassword(this)">Show</span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password_confirmation" id="reg-password-confirm" required minlength="8">
                    <span class="password-toggle" onclick="togglePassword(this)">Show</span>
                </div>
                <button type="submit">Register</button>
            </form>

            <div class="divider">
                <p class="text-muted">Already have an account? <a href="login.html" class="link">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.replace(':8081', ':20143') + '/api';
        function togglePassword(el) {
            const input = el.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            el.textContent = input.type === 'password' ? 'Show' : 'Hide';
        }
        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.classList.remove('hidden');
        }
        async function apiCall(endpoint, data, method = 'POST') {
            const opts = { 
                method, 
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' } 
            };
            if (data) opts.body = JSON.stringify(data);
            const res = await fetch(`${API_URL}${endpoint}`, opts);
            const json = await res.json();
            if (!res.ok) throw new Error(json.message || 'Request failed');
            return json;
        }
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            if (data.password !== data.password_confirmation) {
                showMessage('Passwords do not match');
                return;
            }
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            try {
                const res = await apiCall('/register', data);
                localStorage.setItem('token', res.token);
                showMessage('Registration successful!', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showMessage(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
